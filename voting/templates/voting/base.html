{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Ranked Choice Vote{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  <script>
    /* Apply saved theme before render to prevent flash */
    (function () {
      var t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <header>
    <a href="{% url 'home' %}" class="site-title">Ranked Choice Vote</a>
    <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">☀︎</button>
  </header>

  <main id="main-content">
    {% block content %}{% endblock %}
  </main>

  <div id="card-overlay" class="card-overlay" aria-modal="true" role="dialog">
    <div class="card-overlay-content">
      <div id="overlay-img-wrap"></div>
      <p id="overlay-title" class="card-overlay-title"></p>
    </div>
  </div>

  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
  <script>
    function toggleTheme() {
      var html = document.documentElement;
      var cur  = html.getAttribute('data-theme');
      /* Determine effective theme if no attribute is set */
      if (!cur) {
        cur = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      var next = cur === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }

    /* Init or re-init SortableJS after any HTMX swap */
    function initSortable() {
      var ranked = document.getElementById('options-list');
      var pool   = document.getElementById('pool-list');
      var sortableOpts = {
        group: 'voting',
        animation: 150,
        onEnd: updateRankings,
        scroll: true,
        scrollSensitivity: 80,
        scrollSpeed: 12,
        forceAutoScrollFallback: true,
      };
      if (ranked && !ranked._sortable) {
        ranked._sortable = Sortable.create(ranked, sortableOpts);
      }
      if (pool && !pool._sortable) {
        pool._sortable = Sortable.create(pool, sortableOpts);
      }
      updateRankings();
    }

    function updateRankings() {
      var ranked = document.getElementById('options-list');
      var input  = document.getElementById('rankings-input');
      var btn    = document.getElementById('submit-vote');
      var btnTop = document.getElementById('submit-vote-top');
      if (!input) return;
      var ids = ranked
        ? Array.from(ranked.querySelectorAll('[data-pk]')).map(function (n) { return parseInt(n.dataset.pk, 10); })
        : [];
      input.value = JSON.stringify(ids);
      if (ranked) {
        ranked.querySelectorAll('.rank-num').forEach(function (badge, i) { badge.textContent = i + 1; });
      }
      if (btn) btn.disabled = ids.length === 0;
      if (btnTop) btnTop.disabled = ids.length === 0;
    }

    document.addEventListener('DOMContentLoaded', initSortable);
    document.addEventListener('htmx:afterSwap', initSortable);

    /* Card overlay — show full image + title on click; ignore drag gestures */
    var _dragMoved = false, _dragStartX, _dragStartY;
    document.addEventListener('mousedown', function (e) {
      if (e.target.closest('.option-card')) {
        _dragMoved = false;
        _dragStartX = e.clientX;
        _dragStartY = e.clientY;
      }
    });
    document.addEventListener('mousemove', function (e) {
      if (e.buttons && _dragStartX !== undefined) {
        if (Math.abs(e.clientX - _dragStartX) > 5 || Math.abs(e.clientY - _dragStartY) > 5) {
          _dragMoved = true;
        }
      }
    });
    document.addEventListener('click', function (e) {
      var card = e.target.closest('.option-card');
      if (!card || _dragMoved) return;

      var imgEl   = card.querySelector('img');
      var noImg   = card.querySelector('.option-no-image');
      var label   = card.querySelector('.option-label');
      var rankNum = card.querySelector('.rank-num');
      var title   = label ? label.textContent.replace(rankNum ? rankNum.textContent : '', '').trim() : '';

      var wrap = document.getElementById('overlay-img-wrap');
      wrap.innerHTML = imgEl
        ? '<img src="' + imgEl.src + '" alt="' + title + '">'
        : '<div class="card-overlay-no-image">' + (noImg ? noImg.textContent : '') + '</div>';

      document.getElementById('overlay-title').textContent = title;
      document.getElementById('card-overlay').classList.add('active');
    });

    document.getElementById('card-overlay').addEventListener('click', function (e) {
      if (!e.target.closest('.card-overlay-content')) {
        this.classList.remove('active');
      }
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') document.getElementById('card-overlay').classList.remove('active');
    });

    /* Send CSRF token on every HTMX request, not just form submissions */
    document.body.addEventListener('htmx:configRequest', function (evt) {
      evt.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
