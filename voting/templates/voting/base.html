{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Ranked Choice Vote{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  <script>
    /* Apply saved theme before render to prevent flash */
    (function () {
      var t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <header>
    <a href="{% url 'home' %}" class="site-title">Ranked Choice Vote</a>
    <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">☀︎</button>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
  <script>
    function toggleTheme() {
      var html = document.documentElement;
      var cur  = html.getAttribute('data-theme');
      /* Determine effective theme if no attribute is set */
      if (!cur) {
        cur = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      var next = cur === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }

    /* Init or re-init SortableJS after any HTMX swap */
    function initSortable() {
      var el = document.getElementById('options-list');
      if (!el || el._sortable) return;
      el._sortable = Sortable.create(el, {
        animation: 150,
        onEnd: updateRankings,
      });
      updateRankings();
    }

    function updateRankings() {
      var el    = document.getElementById('options-list');
      var input = document.getElementById('rankings-input');
      if (!el || !input) return;
      var ids = Array.from(el.querySelectorAll('[data-pk]'))
                     .map(function (n) { return parseInt(n.dataset.pk, 10); });
      input.value = JSON.stringify(ids);
      /* Refresh rank number badges */
      el.querySelectorAll('.rank-num').forEach(function (badge, i) {
        badge.textContent = i + 1;
      });
    }

    document.addEventListener('DOMContentLoaded', initSortable);
    document.addEventListener('htmx:afterSwap', initSortable);
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
